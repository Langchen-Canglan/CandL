<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>苍镧 · 琅辰 | 个人主页</title>
  
<style>
    <link rel="stylesheet" href="jiben.css">
</style>
</head>
<body>

  <div class="main-container">

    <!-- 头部 -->
    <header>
      <h1>苍镧 · 琅辰</h1>
      <p class="alias">CANG LAN & LANG CHEN</p>
    </header>

    <!-- 自我介绍（id 选择器：#intro） -->
    <section class="card" id="intro">
      <h2>👤 自我介绍</h2>
      <p>
        你好，我是<span class="highlight">苍镧</span>，也称<span class="highlight">琅辰</span>。<br>
        一个热爱创造、喜欢用代码构建世界的入门开发者。目前正在系统学习前端技术（HTML / CSS / JavaScript），享受从零搭建页面的成就感。
      </p>
    </section>

    <!-- 技能标签（class 选择器复用：.card） -->
    <section class="card" id="skills">
      <h2>🛠 技能标签</h2>
      <div class="tag-list">
        <span class="tag">HTML</span>
        <span class="tag">CSS</span>
        <span class="tag">JavaScript（学习中）</span>
        <span class="tag">GitHub Pages</span>
        <span class="tag">响应式入门</span>
      </div>
    </section>

    <!-- 联系方式（class 选择器复用：.card） -->
    <section class="card" id="contact">
      <h2>📬 联系方式</h2>
      <ul>
        <li>📧 邮箱：<a href="mailto:your_email@example.com">your_email@example.com</a></li>
        <li>🐙 GitHub：<a href="https://github.com/Langchen-Canglan" target="_blank">Langchen-Canglan</a></li>
    </section>

    <!-- 页脚 -->
    <footer>
      © 2026 苍镧 · 琅辰 | 由 GitHub Pages 驱动
    </footer>

  </div>

</body>
</html>
